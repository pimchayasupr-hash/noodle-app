<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบสั่งอาหาร - คิวออนไลน์</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh}
        :root{--orange:#E8612A;--orange-light:#FAECE7;--green:#2D7D46;--green-light:#EAF3DE;--border:#eee;--gray:#888}

        /* UTILS */
        .hidden { display: none !important; }
        .btn-primary { width:100%; background:var(--orange); color:#fff; border:none; border-radius:12px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 12px rgba(232,97,42,0.2); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .input-text { width:100%; border:2px solid var(--border); border-radius:12px; padding:14px; font-size:16px; margin-bottom:15px; outline:none; text-align:center; }
        .input-text:focus { border-color:var(--orange); }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }

        /* ROLE SELECTION SCREEN */
        .role-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: #fff; }
        .role-card { width: 100%; max-width: 340px; text-align: center; }
        .role-btn { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: #fff; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .role-btn:hover { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }

        /* APP CONTAINERS */
        .app-container { display: none; padding-bottom: 80px; }
        .app-container.active { display: block; }
        .topbar { background: #fff; padding: 15px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CUSTOMER UI */
        .menu-item { background: #fff; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 15px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .menu-img { width: 75px; height: 75px; border-radius: 12px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .menu-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .menu-price { color: var(--orange); font-weight: 700; margin-top: 5px; font-size: 16px; }
        .add-btn { background: var(--orange-light); color: var(--orange); border: none; border-radius: 8px; padding: 6px 12px; font-weight: 700; cursor: pointer; }

        /* SELLER UI */
        .order-card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 15px; border: 1px solid var(--border); border-left: 5px solid var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .order-card.done { border-left-color: var(--green); opacity: 0.7; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .q-number { font-size: 24px; font-weight: 800; color: var(--orange); }
        .status-btn { background: var(--orange); color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; }
        .status-btn.done { background: var(--green); }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 200; }
        .nav-item { flex: 1; padding: 12px 0; text-align: center; color: var(--gray); font-size: 11px; background: none; border: none; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--orange); }
        .nav-icon { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="role-screen" class="role-screen">
    <div class="role-card">
        <div style="font-size: 60px; margin-bottom: 10px;">🍜</div>
        <h2 style="margin-bottom: 30px;">ยินดีต้อนรับ</h2>
        <button class="role-btn" onclick="showCustomerSetup()">
            <span>👤</span> ฉันคือลูกค้า (สั่งอาหาร)
        </button>
        <button class="role-btn" onclick="showSellerLogin()">
            <span>🧑‍🍳</span> ฉันคือร้านค้า (รับออเดอร์)
        </button>
    </div>
</div>

<div id="customer-setup-screen" class="role-screen hidden">
    <div class="role-card">
        <h2>รับบัตรคิว</h2>
        <p style="color:var(--gray); font-size:14px; margin-bottom:20px;">กรุณากรอกชื่อเพื่อรันคิวอัตโนมัติ</p>
        <input type="text" id="cust-name" class="input-text" placeholder="ชื่อของคุณ (เช่น คุณเอ)">
        <select id="cust-type" class="input-text">
            <option value="ทานที่ร้าน">🍽 ทานที่ร้าน (ไม่มีโต๊ะ หาที่นั่งเอง)</option>
            <option value="กลับบ้าน">🛍 สั่งกลับบ้าน</option>
        </select>
        <button class="btn-primary" onclick="startCustomerSession()">เริ่มสั่งอาหาร</button>
        <button style="margin-top:15px; background:none; border:none; color:var(--gray); font-weight:600;" onclick="location.reload()">กลับ</button>
    </div>
</div>

<div id="seller-login-screen" class="role-screen hidden">
    <div class="role-card">
        <h2>ระบบจัดการร้าน</h2>
        <p style="color:var(--gray); font-size:14px; margin-bottom:20px;">ใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
        <input type="password" id="seller-pin" class="input-text" placeholder="รหัส PIN (ใส่ 1234)">
        <button class="btn-primary" onclick="startSellerSession()">เข้าสู่ระบบ</button>
        <button style="margin-top:15px; background:none; border:none; color:var(--gray); font-weight:600;" onclick="location.reload()">กลับ</button>
    </div>
</div>

<div id="app-customer" class="app-container">
    <div class="topbar">
        <div>
            <div style="font-size:12px; color:var(--gray);">ลูกค้า</div>
            <div style="font-weight:700; font-size:15px;" id="c-display-name">คุณ...</div>
        </div>
        <div style="text-align:right;">
            <div style="font-size:12px; color:var(--gray);">หมายเลขคิว</div>
            <div style="font-weight:800; font-size:18px; color:var(--orange);" id="c-display-q">Q--</div>
        </div>
    </div>

    <div id="c-screen-menu" class="screen active">
        <h2 class="section-title">รายการอาหาร</h2>
        <div id="c-menu-list"></div>
    </div>

    <div id="c-screen-cart" class="screen">
        <h2 class="section-title">ตะกร้าของคุณ</h2>
        <div id="c-cart-list"></div>
        <div id="c-cart-summary"></div>
    </div>

    <div id="c-screen-status" class="screen">
        <h2 class="section-title">สถานะคิวของคุณ</h2>
        <div id="c-status-list"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="navCustomer('menu')"><span class="nav-icon">🍜</span>เมนู</button>
        <button class="nav-item" onclick="navCustomer('cart')"><span class="nav-icon">🛒</span>ตะกร้า</button>
        <button class="nav-item" onclick="navCustomer('status')"><span class="nav-icon">🎫</span>คิวของฉัน</button>
    </div>
</div>

<div id="app-seller" class="app-container" style="background:#f0f2f5;">
    <div class="topbar">
        <div style="font-weight:800; font-size:18px;">👨‍🍳 หลังบ้านร้านก๋วยเตี๋ยว</div>
        <button style="background:none; border:none; color:var(--orange); font-weight:700;" onclick="location.reload()">ออก</button>
    </div>

    <div id="s-screen-orders" class="screen active">
        <h2 class="section-title">ออเดอร์กำลังทำ 👨‍🍳</h2>
        <div id="s-order-list"></div>
    </div>

    <div id="s-screen-history" class="screen">
        <h2 class="section-title">ออเดอร์เสร็จแล้ว ✅</h2>
        <div id="s-history-list"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="navSeller('orders')"><span class="nav-icon">🔥</span>กำลังทำ</button>
        <button class="nav-item" onclick="navSeller('history')"><span class="nav-icon">✅</span>เสร็จแล้ว</button>
    </div>
</div>

<script>
// --- ข้อมูลจำลอง (Mock Data) ---
const MENUS = [
    {id: 1, name: "ก๋วยเตี๋ยวหมูน้ำตก", price: 40, icon: "🍜"},
    {id: 2, name: "ก๋วยเตี๋ยวต้มยำ", price: 45, icon: "🌶️"},
    {id: 3, name: "เกาเหลาหมูตุ๋น", price: 50, icon: "🍲"},
    {id: 4, name: "น้ำลำไย", price: 15, icon: "🥤"}
];

// STATE ของแอป (ข้อมูลชั่วคราวในเครื่อง)
let STATE = {
    customerName: "",
    customerType: "",
    queueNumber: "",
    cart: [],
    // ออเดอร์ทั้งหมดในระบบ (ปกติจะเก็บใน Database)
    orders: [] 
};

// --- การสลับหน้าแรก ---
function showCustomerSetup() {
    document.getElementById('role-screen').classList.add('hidden');
    document.getElementById('customer-setup-screen').classList.remove('hidden');
}

function showSellerLogin() {
    document.getElementById('role-screen').classList.add('hidden');
    document.getElementById('seller-login-screen').classList.remove('hidden');
}

// ==========================================
// ลอจิกฝั่ง "ลูกค้า"
// ==========================================
function startCustomerSession() {
    const name = document.getElementById('cust-name').value.trim();
    if(!name) { alert('กรุณากรอกชื่อด้วยครับ'); return; }

    STATE.customerName = name;
    STATE.customerType = document.getElementById('cust-type').value;
    // สร้างเลขคิวแบบง่ายๆ (เลข 1-999)
    STATE.queueNumber = "Q" + Math.floor(Math.random() * 900 + 100);

    // อัปเดต UI ลูกค้า
    document.getElementById('c-display-name').textContent = STATE.customerName + " (" + STATE.customerType + ")";
    document.getElementById('c-display-q').textContent = STATE.queueNumber;

    document.getElementById('customer-setup-screen').classList.add('hidden');
    document.getElementById('app-customer').classList.add('active');

    renderCustomerMenu();
}

function renderCustomerMenu() {
    const list = document.getElementById('c-menu-list');
    list.innerHTML = MENUS.map(m => `
        <div class="menu-item">
            <div class="menu-img">${m.icon}</div>
            <div class="menu-info">
                <div style="font-weight:700">${m.name}</div>
                <div class="menu-price">฿${m.price}</div>
            </div>
            <div style="display:flex; align-items:center;">
                <button class="add-btn" onclick="addToCart(${m.id})">+ เพิ่ม</button>
            </div>
        </div>
    `).join('');
}

function addToCart(id) {
    const m = MENUS.find(x => x.id === id);
    STATE.cart.push({...m});
    alert(`เพิ่ม ${m.name} ลงตะกร้าแล้ว!`);
}

function renderCustomerCart() {
    const list = document.getElementById('c-cart-list');
    const summary = document.getElementById('c-cart-summary');
    
    if(STATE.cart.length === 0) {
        list.innerHTML = "<p style='text-align:center; color:#888; padding:20px;'>ตะกร้าว่างเปล่า</p>";
        summary.innerHTML = "";
        return;
    }

    list.innerHTML = STATE.cart.map((c, idx) => `
        <div style="background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; border:1px solid #eee;">
            <div><b>${c.name}</b></div>
            <div>
                <b style="color:var(--orange); margin-right:15px;">฿${c.price}</b>
                <button onclick="STATE.cart.splice(${idx},1); renderCustomerCart();" style="color:red; background:none; border:none; font-weight:bold;">X</button>
            </div>
        </div>
    `).join('');

    const total = STATE.cart.reduce((sum, item) => sum + item.price, 0);
    summary.innerHTML = `
        <div style="font-size:18px; font-weight:700; text-align:right; margin: 20px 0;">รวมสุทธิ: ฿${total}</div>
        <button class="btn-primary" onclick="confirmOrder()">ยืนยันการสั่งอาหาร</button>
    `;
}

function confirmOrder() {
    const total = STATE.cart.reduce((sum, item) => sum + item.price, 0);
    const newOrder = {
        id: STATE.queueNumber,
        name: STATE.customerName,
        type: STATE.customerType,
        items: [...STATE.cart],
        total: total,
        status: "กำลังทำ", // สถานะ: กำลังทำ -> เสร็จแล้ว
        time: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})
    };

    STATE.orders.push(newOrder); // ส่งเข้าส่วนกลาง
    STATE.cart = []; // ล้างตะกร้า
    alert('ส่งออเดอร์ให้ทางร้านเรียบร้อย!');
    navCustomer('status');
}

function renderCustomerStatus() {
    const list = document.getElementById('c-status-list');
    const myOrders = STATE.orders.filter(o => o.id === STATE.queueNumber);

    if(myOrders.length === 0) {
        list.innerHTML = "<p style='text-align:center; color:#888; padding:20px;'>ยังไม่มีออเดอร์</p>";
        return;
    }

    list.innerHTML = myOrders.map(o => `
        <div class="order-card ${o.status === 'เสร็จแล้ว' ? 'done' : ''}">
            <div class="order-header">
                <div>คิวของคุณ: <span class="q-number">${o.id}</span></div>
                <span style="font-weight:700; color:${o.status === 'เสร็จแล้ว' ? 'var(--green)' : 'var(--orange)'};">${o.status}</span>
            </div>
            ${o.items.map(i => `<div style="font-size:14px; margin-bottom:5px;">- ${i.name}</div>`).join('')}
            <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px; font-weight:700; text-align:right;">
                ยอดรวม: ฿${o.total}
            </div>
        </div>
    `).join('');
}

function navCustomer(tab) {
    document.querySelectorAll('#app-customer .screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('#app-customer .nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('c-screen-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');

    if(tab === 'cart') renderCustomerCart();
    if(tab === 'status') renderCustomerStatus();
}

// ==========================================
// ลอจิกฝั่ง "ร้านค้า"
// ==========================================
function startSellerSession() {
    const pin = document.getElementById('seller-pin').value;
    if(pin !== "1234") { alert('รหัสผ่านไม่ถูกต้อง (ลองใส่ 1234)'); return; }

    document.getElementById('seller-login-screen').classList.add('hidden');
    document.getElementById('app-seller').classList.add('active');
    renderSellerOrders();
}

function renderSellerOrders() {
    const listTodo = document.getElementById('s-order-list');
    const listDone = document.getElementById('s-history-list');

    const todoOrders = STATE.orders.filter(o => o.status === "กำลังทำ");
    const doneOrders = STATE.orders.filter(o => o.status === "เสร็จแล้ว");

    // วาดออเดอร์ที่ต้องทำ
    listTodo.innerHTML = todoOrders.length ? todoOrders.map(o => `
        <div class="order-card">
            <div class="order-header">
                <div><span class="q-number">${o.id}</span> <span style="font-size:14px; color:#888;">(${o.type})</span></div>
                <div>${o.time}</div>
            </div>
            <div style="font-weight:700; margin-bottom:10px;">👤 ${o.name}</div>
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;">
                ${o.items.map(i => `<div style="font-size:15px; margin-bottom:5px;">👉 1x ${i.name}</div>`).join('')}
            </div>
            <button class="status-btn" onclick="markAsDone('${o.id}')">กดเมื่อทำเสร็จ ✅</button>
        </div>
    `).join('') : "<p style='text-align:center; padding:20px;'>ไม่มีออเดอร์ใหม่เลยจ้า ลุย!</p>";

    // วาดออเดอร์ที่เสร็จแล้ว
    listDone.innerHTML = doneOrders.length ? doneOrders.map(o => `
        <div class="order-card done">
            <div class="order-header">
                <div><span class="q-number">${o.id}</span></div>
                <div style="color:var(--green); font-weight:700;">ส่งอาหารแล้ว</div>
            </div>
            <div style="font-weight:700; color:#555;">👤 ${o.name} (ยอด ฿${o.total})</div>
        </div>
    `).join('') : "<p style='text-align:center; padding:20px;'>ยังไม่มีออเดอร์ที่ทำเสร็จ</p>";
}

function markAsDone(qId) {
    const order = STATE.orders.find(o => o.id === qId);
    if(order) {
        order.status = "เสร็จแล้ว";
        renderSellerOrders();
    }
}

function navSeller(tab) {
    document.querySelectorAll('#app-seller .screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('#app-seller .nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('s-screen-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
    renderSellerOrders();
}
</script>
</body>
</html>
