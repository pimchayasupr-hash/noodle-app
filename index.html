<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ก๋วยเตี๋ยวหมู — ระบบสั่งอาหาร & รันคิว</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh}
        :root{--orange:#E8612A;--orange-light:#FAECE7;--orange-dark:#B34A1E;--green:#2D7D46;--green-light:#EAF3DE;--border:#e8e8e8;--gray:#888;--bg:#f5f5f5}

        /* SETUP / QUEUE ENTRY SCREEN */
        .setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg, var(--orange-light) 0%, #fff 100%)}
        .setup-card{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:360px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center}
        .setup-logo{font-size:60px;margin-bottom:10px}
        
        .type-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
        .type-btn{border:2px solid var(--border);border-radius:15px;padding:15px 10px;cursor:pointer;transition:0.2s}
        .type-btn.active{border-color:var(--orange);background:var(--orange-light)}
        .type-btn b{display:block;font-size:16px;margin-bottom:4px}
        .type-btn span{font-size:12px;color:var(--gray)}

        .setup-input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:15px;margin-bottom:12px;outline:none}
        .setup-input:focus{border-color:var(--orange)}
        
        .btn-primary{width:100%;background:var(--orange);color:#fff;border:none;border-radius:15px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(232,97,42,0.3)}

        /* MAIN APP UI */
        .topbar{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:10px 16px}
        .user-info-bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}
        .q-badge{background:var(--orange);color:#fff;padding:2px 10px;border-radius:10px}

        .cat-tabs{display:flex;overflow-x:auto;padding:10px 0;gap:8px;scrollbar-width:none}
        .cat-tabs::-webkit-scrollbar{display:none}
        .cat-tab{flex-shrink:0;padding:8px 16px;background:#fff;border-radius:20px;font-size:14px;border:1px solid var(--border);cursor:pointer}
        .cat-tab.active{background:var(--orange);color:#fff;border-color:var(--orange)}

        .screen{display:none;padding:16px 16px 100px}
        .screen.active{display:block}

        .menu-item{background:#fff;border-radius:16px;margin-bottom:12px;padding:12px;display:flex;gap:12px;border:1px solid var(--border)}
        .menu-img{width:80px;height:80px;border-radius:12px;background:#f9f9f9;display:flex;align-items:center;justify-content:center;font-size:30px}
        .menu-info{flex:1}
        .menu-price{color:var(--orange);font-weight:700;margin-top:4px}

        /* MODAL */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end}
        .modal-overlay.open{display:flex}
        .modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto}

        /* BOTTOM NAV */
        .cart-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:90%;background:var(--orange);color:#fff;padding:15px;border-radius:15px;display:flex;justify-content:space-between;z-index:200;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
        .bottom-nav{position:fixed;bottom:0;width:100%;max-width:480px;background:#fff;display:flex;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
        .nav-item{flex:1;padding:12px;text-align:center;font-size:11px;color:var(--gray);background:none;border:none}
        .nav-item.active{color:var(--orange)}
        .nav-icon{display:block;font-size:20px;margin-bottom:2px}
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup-screen" class="setup-screen">
    <div class="setup-card">
        <div class="setup-logo">🍜</div>
        <h2>ก๋วยเตี๋ยวหมู</h2>
        <p style="color:var(--gray); font-size: 14px;">กรุณาเลือกรูปแบบการรับประทาน</p>
        
        <div class="type-selector">
            <div class="type-btn active" id="type-here" onclick="selectEntryType('here')">
                <b>🍜 ทานที่ร้าน</b>
                <span>ระบุเลขโต๊ะ</span>
            </div>
            <div class="type-btn" id="type-takeaway" onclick="selectEntryType('takeaway')">
                <b>🛍 กลับบ้าน</b>
                <span>รับที่เคาน์เตอร์</span>
            </div>
        </div>

        <div id="table-input-group">
            <input type="number" class="setup-input" id="setup-table" placeholder="ระบุหมายเลขโต๊ะ" min="1">
        </div>
        
        <div style="text-align: left; margin-bottom: 5px; font-size: 13px; color: var(--gray);">⏰ เวลารับอาหาร:</div>
        <select id="entry-time" class="setup-input">
            <option value="now">รับทันที (ตามคิว)</option>
        </select>

        <input type="text" class="setup-input" id="setup-name" placeholder="ชื่อของคุณ (เช่น คุณมินนี่)">
        
        <button class="btn-primary" onclick="generateQueue()">รับคิวและเริ่มสั่งอาหาร</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="topbar">
        <div class="user-info-bar">
            <div><span class="q-badge" id="display-q">คิวที่ --</span> <span id="display-name">คุณลูกค้า</span></div>
            <div id="display-type">📍 โต๊ะ --</div>
        </div>
        <div class="cat-tabs" id="cat-tabs"></div>
    </div>

    <div id="screen-menu" class="screen active"></div>
    <div id="screen-cart" class="screen">
        <h3 style="margin-bottom:15px">รายการในตะกร้า</h3>
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
    </div>
    <div id="screen-orders" class="screen">
        <h3 style="margin-bottom:15px">สถานะออเดอร์ของคุณ</h3>
        <div id="orders-content"></div>
    </div>
    <div id="screen-mgmt" class="screen">
        <h3 style="margin-bottom:15px">Dashboard (สำหรับร้าน)</h3>
        <div id="mgmt-content"></div>
    </div>

    <div id="cart-bar" class="cart-bar hidden" onclick="goNav('cart')">
        <span id="cb-count">0 รายการ</span>
        <b id="cb-price">฿0</b>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="goNav('menu')"><span class="nav-icon">🍜</span>เมนู</button>
        <button class="nav-item" onclick="goNav('cart')"><span class="nav-icon">🛒</span>ตะกร้า</button>
        <button class="nav-item" onclick="goNav('orders')"><span class="nav-icon">📋</span>ออเดอร์</button>
        <button class="nav-item" onclick="goNav('mgmt')"><span class="nav-icon">⚙️</span>ร้านค้า</button>
    </div>
</div>

<div class="modal-overlay" id="item-modal">
    <div class="modal" id="item-modal-body"></div>
</div>

<script>
// --- CONFIG & DATA ---
const S = {
    myQueue: 0,
    myName: '',
    myTable: '',
    orderType: 'here',
    pickTime: 'now',
    menus: [
        {id:1, cat:'ก๋วยเตี๋ยว', name:'ก๋วยเตี๋ยวหมูน้ำตก', price:20, icon:'🍜', isNoodle:true},
        {id:2, cat:'ก๋วยเตี๋ยว', name:'ก๋วยเตี๋ยวหมูพิเศษ', price:35, icon:'🍜', isNoodle:true},
        {id:3, cat:'ของทานเล่น', name:'ลูกชิ้นหมูลวก', price:40, icon:'🍡', isNoodle:false},
        {id:4, cat:'เครื่องดื่ม', name:'น้ำลำไย', price:20, icon:'🥤', isNoodle:false}
    ],
    cart: [],
    allOrders: [] // ในแอปจริงส่วนนี้ต้องดึงจาก Database หรือ Firebase
};

// --- ENTRY LOGIC ---
function initTimeOptions() {
    const sel = document.getElementById('entry-time');
    const now = new Date();
    for(let i=1; i<=12; i++) {
        const d = new Date(now.getTime() + i*10*60000); // ทุกๆ 10 นาที
        const timeStr = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        const opt = document.createElement('option');
        opt.value = timeStr;
        opt.textContent = "รอบเวลา " + timeStr + " น.";
        sel.appendChild(opt);
    }
}
initTimeOptions();

function selectEntryType(type) {
    S.orderType = type;
    document.getElementById('type-here').classList.toggle('active', type === 'here');
    document.getElementById('type-takeaway').classList.toggle('active', type === 'takeaway');
    document.getElementById('table-input-group').classList.toggle('hidden', type === 'takeaway');
}

function generateQueue() {
    const tableInput = document.getElementById('setup-table').value;
    const nameInput = document.getElementById('setup-name').value.trim();
    
    if(S.orderType === 'here' && !tableInput) {
        alert('กรุณากรอกเลขโต๊ะด้วยจ้า'); return;
    }
    
    // ระบบรันคิวจำลอง (อิงจากเวลาปัจจุบัน วินาที+มิลลิวินาที เพื่อให้คนกดก่อนได้เลขน้อยกว่า)
    const now = new Date();
    S.myQueue = (now.getMinutes() * 100) + now.getSeconds(); 
    S.myName = nameInput || "ลูกค้าทั่วไป";
    S.myTable = S.orderType === 'here' ? tableInput : "กลับบ้าน";
    S.pickTime = document.getElementById('entry-time').value;

    // UI Update
    document.getElementById('display-q').textContent = "คิวที่ " + S.myQueue;
    document.getElementById('display-name').textContent = S.myName;
    document.getElementById('display-type').textContent = S.orderType === 'here' ? "📍 โต๊ะ " + S.myTable : "🛍 กลับบ้าน (" + S.pickTime + ")";
    
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    
    renderMenu();
    renderCatTabs();
}

// --- MENU & CART LOGIC ---
function renderCatTabs() {
    const cats = ['ก๋วยเตี๋ยว', 'ของทานเล่น', 'เครื่องดื่ม'];
    const el = document.getElementById('cat-tabs');
    el.innerHTML = cats.map(c => `<div class="cat-tab" onclick="filterMenu('${c}')">${c}</div>`).join('');
}

function renderMenu() {
    const el = document.getElementById('screen-menu');
    el.innerHTML = S.menus.map(m => `
        <div class="menu-item" onclick="openItem(${m.id})">
            <div class="menu-img">${m.icon}</div>
            <div class="menu-info">
                <div style="font-weight:700">${m.name}</div>
                <div class="menu-price">฿${m.price}</div>
            </div>
            <button style="background:var(--orange); color:#fff; border:none; border-radius:8px; padding:5px 15px; align-self:center;">สั่ง</button>
        </div>
    `).join('');
}

function openItem(id) {
    const m = S.menus.find(x => x.id === id);
    const modal = document.getElementById('item-modal');
    const body = document.getElementById('item-modal-body');
    
    body.innerHTML = `
        <h2 style="margin-bottom:10px">${m.icon} ${m.name}</h2>
        <p style="color:var(--orange); font-size:20px; font-weight:700; margin-bottom:15px">฿${m.price}</p>
        
        <p><b>เส้น:</b></p>
        <select id="opt-noodle" class="setup-input" style="margin-top:5px">
            <option>เส้นเล็ก</option><option>เส้นใหญ่</option><option>เส้นหมี่</option><option>วุ้นเส้น</option>
        </select>
        
        <p><b>หมายเหตุเพิ่มเติม:</b></p>
        <textarea id="opt-note" class="setup-input" style="height:80px; margin-top:5px" placeholder="เช่น ไม่ผัก, เผ็ดน้อย"></textarea>
        
        <button class="btn-primary" onclick="addToCart(${m.id})">เพิ่มลงตะกร้า</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; padding:15px; color:var(--gray)">ยกเลิก</button>
    `;
    modal.classList.add('open');
}

function addToCart(id) {
    const m = S.menus.find(x => x.id === id);
    const noodle = document.getElementById('opt-noodle').value;
    const note = document.getElementById('opt-note').value;
    
    S.cart.push({ ...m, noodle, note });
    closeModal();
    updateCartBar();
}

function updateCartBar() {
    const bar = document.getElementById('cart-bar');
    if(S.cart.length > 0) {
        bar.classList.remove('hidden');
        document.getElementById('cb-count').textContent = S.cart.length + " รายการ";
        document.getElementById('cb-price').textContent = "฿" + S.cart.reduce((s,i)=>s+i.price, 0);
    } else {
        bar.classList.add('hidden');
    }
}

function renderCart() {
    const el = document.getElementById('cart-items');
    if(S.cart.length === 0) { el.innerHTML = "ตะกร้าว่างเปล่า"; return; }
    
    el.innerHTML = S.cart.map((item, index) => `
        <div style="background:#fff; padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between">
            <div>
                <b>${item.name}</b><br>
                <small>${item.noodle} | ${item.note}</small>
            </div>
            <b>฿${item.price}</b>
            <button onclick="S.cart.splice(${index},1); renderCart(); updateCartBar();" style="border:none; color:red; background:none">✕</button>
        </div>
    `).join('');
    
    document.getElementById('cart-summary').innerHTML = `
        <div style="margin-top:20px; padding:15px; background:#fff; border-radius:12px">
            <div style="display:flex; justify-content:space-between"><span>รวมทั้งหมด</span><b>฿${S.cart.reduce((s,i)=>s+i.price, 0)}</b></div>
        </div>
        <button class="btn-primary" style="margin-top:15px" onclick="confirmOrder()">ยืนยันออเดอร์ (คิวที่ ${S.myQueue})</button>
    `;
}

function confirmOrder() {
    const newOrder = {
        q: S.myQueue,
        name: S.myName,
        items: [...S.cart],
        type: S.orderType,
        time: S.pickTime,
        status: 'รอดำเนินการ'
    };
    S.allOrders.push(newOrder);
    S.cart = [];
    updateCartBar();
    goNav('orders');
}

function renderOrders() {
    const el = document.getElementById('orders-content');
    const myOrders = S.allOrders.filter(o => o.q === S.myQueue);
    
    if(myOrders.length === 0) { el.innerHTML = "คุณยังไม่ได้สั่งอาหาร"; return; }
    
    el.innerHTML = myOrders.map(o => `
        <div style="background:#fff; padding:16px; border-radius:16px; border-left:5px solid var(--orange)">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <b>คิวที่ ${o.q}</b>
                <span style="color:var(--orange)">● ${o.status}</span>
            </div>
            ${o.items.map(i => `<div style="font-size:14px">1x ${i.name} (${i.noodle})</div>`).join('')}
        </div>
    `).join('');
}

// --- NAVIGATION ---
function goNav(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    if(screen === 'cart') renderCart();
    if(screen === 'orders') renderOrders();
    if(screen === 'mgmt') renderMgmt(); // ส่วนเจ้าของร้าน
}

function renderMgmt() {
    const el = document.getElementById('mgmt-content');
    el.innerHTML = S.allOrders.map(o => `
        <div style="background:#fff; padding:12px; margin-bottom:8px; border-radius:8px">
            <b>Q:${o.q}</b> - ${o.name} (${o.type}) <br>
            <small>${o.items.length} รายการ - ${o.time}</small>
        </div>
    `).join('') || "ยังไม่มีออเดอร์เข้า";
}

function closeModal() { document.getElementById('item-modal').classList.remove('open'); }

</script>
</body>
</html>
