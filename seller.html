<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🧑‍🍳 หลังบ้าน – ฮุ้ง ก๋วยเตี๋ยว</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#c00000;--rl:#fff0f0;--green:#27ae60;--gl:#e8f5e9;--gold:#f1c40f;--brown:#5d3a1a;--bg:#f0f0f0;--orange:#e67e22;}
body{font-family:"Kanit",sans-serif;background:var(--bg);min-height:100vh;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1a1a2e,#2d2d44);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,.4);}
.hdr-inner{display:flex;align-items:center;padding:13px 16px;gap:10px;}
.logo-sm{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0;}
.logo-sm img{width:100%;height:100%;object-fit:cover;}
.hdr-title{font-size:15px;font-weight:700;color:var(--gold);}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px;}
/* STATS */
.stats{display:flex;background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.08);}
.sb{flex:1;text-align:center;padding:10px 4px;border-right:1px solid rgba(255,255,255,.08);}
.sb:last-child{border-right:none;}
.sb-n{font-size:20px;font-weight:900;color:var(--gold);}
.sb-l{font-size:10px;opacity:.7;margin-top:1px;}
/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:102px;z-index:90;}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:600;font-family:"Kanit",sans-serif;border:none;background:none;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.act{color:var(--red);border-bottom-color:var(--red);}
/* LIVE BAR */
.live-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid #eee;font-size:12px;color:#aaa;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 1.5s infinite alternate;}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
.btn-rf{border:none;background:none;color:var(--red);font-size:13px;font-family:"Kanit",sans-serif;font-weight:600;cursor:pointer;padding:4px 10px;border-radius:8px;}
/* CONTENT */
.ct{padding:12px;}
.ts{display:none;}
.ts.act{display:block;}
/* ORDER CARD */
.oc{background:#fff;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:5px solid var(--red);}
.oc.done{border-left-color:var(--green);}
.oc.verify{border-left-color:var(--orange);}
.oc-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.oc-hdr.r{background:var(--rl);}
.oc-hdr.g{background:var(--gl);}
.oc-hdr.o{background:#fff8f0;}
.oc-q{font-size:18px;font-weight:900;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.b-r{background:var(--rl);color:var(--red);border:1px solid rgba(192,0,0,.15);}
.b-g{background:var(--gl);color:var(--green);border:1px solid rgba(39,174,96,.15);}
.b-o{background:#fff3e0;color:var(--orange);border:1px solid rgba(230,126,34,.15);}
/* ITEMS */
.oc-items{padding:12px 14px;}
.ir{display:flex;gap:8px;padding:8px 0;border-bottom:1px dashed #f0f0f0;}
.ir:last-child{border-bottom:none;}
.ir-num{background:#f0f0f0;color:#888;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ir-body{flex:1;}
.ir-name{font-size:14px;font-weight:700;}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600;display:inline-block;margin:2px 2px 0 0;}
.t-n{background:#fff3cd;color:#856404;}
.t-t{background:#e3f2fd;color:#1565c0;}
.t-no{background:#fce4ec;color:#880e4f;}
.t-nt{background:#f3e5f5;color:#6a1b9a;}
.t-tm{background:#e8f5e9;color:#1b5e20;}
.ir-p{font-size:14px;font-weight:700;color:var(--red);white-space:nowrap;}
/* SLIP */
.slip-sec{padding:10px 14px;border-top:1px solid #f5f5f5;}
.slip-lbl{font-size:12px;color:#aaa;margin-bottom:6px;}
.slip-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;border:1px solid #eee;cursor:pointer;}
.slip-acts{display:flex;gap:8px;margin-top:8px;}
.btn-ok2{flex:1;background:var(--green);color:#fff;border:none;padding:11px;border-radius:10px;font-size:14px;font-weight:700;font-family:"Kanit",sans-serif;cursor:pointer;}
.btn-rej{flex:1;background:#e74c3c;color:#fff;border:none;padding:11px;border-radius:10px;font-size:14px;font-weight:700;font-family:"Kanit",sans-serif;cursor:pointer;}
.v-ok{background:var(--gl);color:var(--green);font-size:13px;font-weight:700;padding:9px 14px;border-radius:10px;text-align:center;}
/* FOOTER */
.oc-ftr{background:#fafafa;border-top:1px solid #f0f0f0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.oc-tot{font-size:15px;font-weight:700;}
.oc-tot span{color:var(--red);font-size:17px;}
.btn-done{background:var(--red);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;font-family:"Kanit",sans-serif;cursor:pointer;white-space:nowrap;}
.btn-undone{background:#e0e0e0;color:#888;}
.btn-lock{background:#ccc;cursor:not-allowed;}
/* SLIP FULLSCREEN */
.smodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;padding:20px;}
.smodal.open{display:flex;}
.smodal img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:10px;}
.smodal-x{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer;background:rgba(0,0,0,.4);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;}
/* SUMMARY */
.sm-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sm-title{font-size:14px;font-weight:700;color:var(--brown);margin-bottom:10px;}
.sm-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:14px;}
.sm-row:last-child{border-bottom:none;}
.sm-val{font-weight:700;color:var(--red);}
.income-hero{background:linear-gradient(135deg,#1a4d0e,var(--green));border-radius:14px;padding:22px;margin-bottom:12px;text-align:center;color:#fff;}
.ih-amt{font-size:40px;font-weight:900;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#bbb;}
.empty .ei{font-size:48px;display:block;margin-bottom:10px;}
/* SPIN */
.spin{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
/* TOAST */
/* toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-bottom:1px solid #eee;}
.toggle-lbl{font-size:14px;font-weight:700;font-family:"Kanit",sans-serif;}
.switch{position:relative;width:52px;height:28px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#ccc;border-radius:28px;cursor:pointer;transition:.3s;}
.slider::before{content:"";position:absolute;width:22px;height:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--green);}
input:checked+.slider::before{transform:translateX(24px);}
/* sold out grid */
.so-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px;}
.so-item{border:1.5px solid #e0e0e0;border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px;background:#fff;cursor:pointer;}
.so-item.sold{border-color:#e74c3c;background:#fff5f5;}
.so-check{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.so-item.sold .so-check{background:#e74c3c;border-color:#e74c3c;color:#fff;}
.so-name{font-size:13px;font-weight:600;font-family:"Kanit",sans-serif;}
#toast{visibility:hidden;min-width:200px;background:#1a1a1a;color:#fff;text-align:center;border-radius:30px;padding:12px 18px;position:fixed;z-index:600;left:50%;bottom:30px;font-size:14px;transform:translateX(-50%);font-family:"Kanit",sans-serif;font-weight:600;}
#toast.show{visibility:visible;animation:fi .3s,fo .5s 2.2s forwards;}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fo{from{opacity:1}to{opacity:0}}
/* new order alert */
#new-order-alert{display:none;position:fixed;top:0;left:0;right:0;z-index:700;background:#27ae60;color:#fff;text-align:center;padding:14px 16px;font-family:"Kanit",sans-serif;font-size:16px;font-weight:700;animation:slidein .3s ease;cursor:pointer;}
@keyframes slidein{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#new-order-alert .alert-close{float:right;font-size:20px;line-height:1;cursor:pointer;opacity:.8;}
</style>
</head>
<body>

<div id="new-order-alert" onclick="dismissAlert()">
  <span id="alert-text">🔔 มีออเดอร์ใหม่!</span>
  <span class="alert-close" onclick="dismissAlert()">✕</span>
</div>
<div class="hdr">
  <div class="hdr-inner">
    <div class="logo-sm"><img src="img/logo.png" alt="logo"></div>
    <div><div class="hdr-title">หลังบ้าน – ก๋วยเตี๋ยวกากหมูต้มยำ</div><div class="hdr-sub">หน้าจอเจ้าของร้าน 🧑‍🍳 | เปิด 08:00-14:00</div></div>
  </div>
  <div class="stats">
    <div class="sb"><div class="sb-n" id="sv">–</div><div class="sb-l">รอตรวจสลิป 🔍</div></div>
    <div class="sb"><div class="sb-n" id="sw">–</div><div class="sb-l">รอทำ ⏳</div></div>
    <div class="sb"><div class="sb-n" id="sd">–</div><div class="sb-l">เสร็จ ✅</div></div>
    <div class="sb"><div class="sb-n" id="si">–</div><div class="sb-l">รายรับ 💰</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab act" id="tab-v" onclick="sw('v')">🔍 ตรวจสลิป</button>
  <button class="tab" id="tab-w" onclick="sw('w')">⏳ รอทำ</button>
  <button class="tab" id="tab-d" onclick="sw('d')">✅ เสร็จ</button>
  <button class="tab" id="tab-s" onclick="sw('s')">📊 สรุป</button>
</div>

<div class="live-bar">
  <div><span class="dot"></span>Realtime sync ทุกเครื่อง</div>
  <button class="btn-rf" onclick="renderAll()">🔄</button>
</div>

<!-- เปิด/ปิดร้าน -->
<div class="toggle-wrap">
  <span class="toggle-lbl" id="shop-status-lbl">🔴 ร้านปิดอยู่</span>
  <label class="switch" style="margin-left:auto;">
    <input type="checkbox" id="shop-toggle" onchange="toggleShop(this.checked)">
    <span class="slider"></span>
  </label>
</div>

<!-- เมนูหมด -->
<div style="padding:8px 16px 0;background:#fff;border-bottom:1px solid #eee;">
  <div style="font-size:13px;font-weight:700;color:var(--brown);padding:8px 0 4px;">🚫 ทำเครื่องหมายเมนูหมด</div>
  <div class="so-grid" id="so-grid"></div>
</div>

<div class="ct">
  <div class="ts act" id="ts-v"><div style="text-align:center;padding:30px;"><div class="spin"></div></div></div>
  <div class="ts" id="ts-w"><div style="text-align:center;padding:30px;"><div class="spin"></div></div></div>
  <div class="ts" id="ts-d">
    <div id="od"></div>
    <button onclick="clearDone()" style="width:100%;background:#f5f5f5;border:1px solid #ddd;color:#999;padding:12px;border-radius:10px;font-family:Kanit,sans-serif;font-size:14px;cursor:pointer;margin-top:4px;margin-bottom:20px;">🗑 ลบออเดอร์ที่เสร็จแล้วทั้งหมด</button>
  </div>
  <div class="ts" id="ts-s"><div id="sm"></div></div>
</div>

<!-- Slip fullscreen -->
<div class="smodal" id="smodal">
  <div class="smodal-x" onclick="document.getElementById('smodal').classList.remove('open')">✕</div>
  <img id="smodal-img" src="" alt="slip">
</div>
<div id="toast"></div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app = initializeApp({
  apiKey: "AIzaSyAzFDduc4JpJlInNV2WNGRAcmproWfirLg",
  authDomain: "hung-noodle.firebaseapp.com",
  databaseURL: "https://hung-noodle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hung-noodle",
  storageBucket: "hung-noodle.firebasestorage.app",
  messagingSenderId: "99341892466",
  appId: "1:99341892466:web:58aae8b6387bc625113beb"
});
const db  = getDatabase(app);
const oRef = ref(db,"orders");
window._FB = { db, oRef, ref, push, onValue, update, remove, get };
window._fbReady = true;
window.dispatchEvent(new Event("fbReady"));
</script>


<script>
let curTab="v", allOrders=[];

/* ── sound + alert ── */
let prevOrderCount=null;
let audioCtx=null;

function unlockAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  document.removeEventListener("click",unlockAudio);
}
document.addEventListener("click",unlockAudio,{once:false});

function playNewOrderSound(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    // เสียง 3 โน้ต ding-ding-ding
    [0,0.18,0.36].forEach((delay,i)=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;
      osc.type="sine";
      gain.gain.setValueAtTime(0,audioCtx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.4,audioCtx.currentTime+delay+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay+0.35);
      osc.start(audioCtx.currentTime+delay);
      osc.stop(audioCtx.currentTime+delay+0.4);
    });
  }catch(e){console.warn("audio:",e);}
}

function showNewOrderAlert(count){
  const el=document.getElementById("new-order-alert");
  const txt=document.getElementById("alert-text");
  if(!el) return;
  txt.innerText="🔔 มีออเดอร์ใหม่ "+count+" รายการ! กดที่นี่เพื่อดู";
  el.style.display="block";
  // auto hide after 8s
  clearTimeout(window._alertTimer);
  window._alertTimer=setTimeout(dismissAlert,8000);
}
function dismissAlert(){
  const el=document.getElementById("new-order-alert");
  if(el) el.style.display="none";
  // switch to verify tab
  if(curTab!=="v") sw("v");
}

/* ── เปิด/ปิดร้าน ── */
function toggleShop(isOpen){
  if(!window._FB) return;
  const r=window._FB.ref(window._FB.db,"settings/isOpen");
  window._FB.update(window._FB.ref(window._FB.db,"settings"),{isOpen});
  updateShopToggleUI(isOpen);
  showToast(isOpen?"🟢 เปิดร้านแล้ว!":"🔴 ปิดร้านแล้ว!");
}
function updateShopToggleUI(isOpen){
  const lbl=document.getElementById("shop-status-lbl");
  const tog=document.getElementById("shop-toggle");
  if(lbl) lbl.innerText=isOpen?"🟢 ร้านเปิดอยู่":"🔴 ร้านปิดอยู่";
  if(tog) tog.checked=isOpen;
}
function listenShopStatus(){
  if(!window._FB){setTimeout(listenShopStatus,500);return;}
  window._FB.onValue(window._FB.ref(window._FB.db,"settings/isOpen"),snap=>{
    updateShopToggleUI(snap.val()!==false);
  });
}

/* ── sold out ── */
const MENU_NAMES={M1:"ก๋วยเตี๋ยวน้ำใส",M2:"ก๋วยเตี๋ยวแห้งต้มยำ",M3:"ก๋วยเตี๋ยวน้ำต้มยำ"};
let soldOutState={};
function renderSoldOutGrid(){
  const g=document.getElementById("so-grid"); if(!g) return;
  g.innerHTML=Object.entries(MENU_NAMES).map(([id,name])=>{
    const sold=soldOutState[id]===true;
    return `<div class="so-item ${sold?"sold":""}" onclick="toggleSoldOut('${id}')">
      <div class="so-check">${sold?"✕":""}</div>
      <div class="so-name">${name}${sold?"<br><span style='color:#e74c3c;font-size:10px;'>หมดแล้ว</span>":""}</div>
    </div>`;
  }).join("");
}
async function toggleSoldOut(id){
  if(!window._FB) return;
  soldOutState[id]=!soldOutState[id];
  await window._FB.update(window._FB.ref(window._FB.db,"settings/soldOut"),{[id]:soldOutState[id]});
  renderSoldOutGrid();
  showToast(soldOutState[id]?"🚫 "+MENU_NAMES[id]+" หมดแล้ว":"✅ "+MENU_NAMES[id]+" มีแล้ว");
}
function listenSoldOut(){
  if(!window._FB){setTimeout(listenSoldOut,500);return;}
  window._FB.onValue(window._FB.ref(window._FB.db,"settings/soldOut"),snap=>{
    soldOutState=snap.val()||{};
    renderSoldOutGrid();
  });
}

function fbListen(){
  if(!window._FB){setTimeout(fbListen,500);return;}
  window._FB.onValue(window._FB.oRef, snap=>{
    allOrders=[];
    snap.forEach(child=>{
      const o=child.val(); o._key=child.key;
      if(o.slip==="__local__") o.slip="";
      allOrders.push(o);
    });
    const newCount=allOrders.filter(o=>o.status==="รอตรวจสลิป").length;
    if(prevOrderCount!==null && newCount>prevOrderCount){
      playNewOrderSound();
      showNewOrderAlert(newCount);
    }
    prevOrderCount=newCount;
    renderAll();
  });
}

function renderAll(){
  const byQueue=(a,b)=>(parseInt(a.id.replace("Q",""))||0)-(parseInt(b.id.replace("Q",""))||0);
  const verify=allOrders.filter(o=>o.status==="รอตรวจสลิป"||o.status==="สลิปไม่ผ่าน").sort(byQueue);
  const waiting=allOrders.filter(o=>o.status==="รอทำ").sort(byQueue);
  const done=allOrders.filter(o=>o.status==="เสร็จแล้ว").sort(byQueue).reverse();
  const income=done.reduce((s,o)=>s+(o.total||0),0);

  document.getElementById("sv").innerText=verify.length;
  document.getElementById("sw").innerText=waiting.length;
  document.getElementById("sd").innerText=done.length;
  document.getElementById("si").innerText="฿"+income;
  document.getElementById("tab-v").innerText=`🔍 สลิป${verify.length?" ("+verify.length+")":""}`;

  fill("ts-v", verify);
  fill("ts-w", waiting);
  document.getElementById("od").innerHTML=done.length?done.map(card).join(""):emptyHTML("📋","ยังไม่มีออเดอร์เสร็จ");
  if(curTab==="s") renderSummary();
}

function fill(id,arr){
  document.getElementById(id).innerHTML=arr.length?arr.map(card).join(""):emptyHTML("🎉","ไม่มีรายการ");
}
function emptyHTML(e,t){return`<div class="empty"><span class="ei">${e}</span><p>${t}</p></div>`;}

function card(o){
  const done=o.status==="เสร็จแล้ว";
  const verifying=o.status==="รอตรวจสลิป"||o.status==="สลิปไม่ผ่าน";
  const waiting=o.status==="รอทำ";
  const hc=done?"g":verifying?"o":"r";
  const bc=done?"b-g":verifying?"b-o":"b-r";
  const bt=done?"✅ เสร็จแล้ว":verifying?"🔍 "+o.status:"⏳ รอทำ";
  const qc=done?"var(--green)":verifying?"var(--orange)":"var(--red)";

  const items=(o.items||[]).map((it,i)=>{
    let tags="";
    if(it.noodle) tags+=`<span class="tag t-n">🌾 ${it.noodle}</span>`;
    if(it.pickupTime) tags+=`<span class="tag t-tm">⏰ ${it.pickupTime}</span>`;
    (it.toppings||[]).forEach(t=>tags+=`<span class="tag t-t">${t}</span>`);
    (it.noToppings||[]).forEach(t=>tags+=`<span class="tag t-no">ไม่ใส่ ${t}</span>`);
    if(it.note) tags+=`<span class="tag t-nt">📝 ${it.note}</span>`;
    return `<div class="ir">
      <div class="ir-num">${i+1}</div>
      <div class="ir-body"><div class="ir-name">${it.emoji||'🍜'} ${it.name||"-"}</div><div style="margin-top:4px;">${tags||'<span style="font-size:12px;color:#aaa;">มาตรฐาน</span>'}</div></div>
      <div class="ir-p">฿${it.price||0}</div>
    </div>`;
  }).join("");

  let slipSec="";
  if(o.slipVerified){
    slipSec=`<div class="slip-sec"><div class="v-ok">✅ ยืนยันการชำระเงินแล้ว</div></div>`;
  } else if(o.status!=="เสร็จแล้ว"){
    const hasSlip = o.slip && o.slip.length > 100 && o.slip.startsWith("data:");
    const rejMsg  = o.status==="สลิปไม่ผ่าน"
      ? '<div style="color:#e74c3c;font-size:12px;font-weight:700;margin:6px 0 4px;">❌ ปฏิเสธแล้ว — ยืนยันใหม่?</div>'
      : "";
    const slipImg = hasSlip
      ? `<img class="slip-img" src="${o.slip}" onclick="viewSlip('${o._key}')"><br>`
      : `<div style="background:#fff8e1;border-radius:8px;padding:10px;font-size:13px;color:#e67e22;margin-bottom:8px;">⏳ รอสลิปจากลูกค้า (กำลังโหลด...)</div>`;
    slipSec=`<div class="slip-sec">
      <div class="slip-lbl">📸 สลิปการโอนเงิน ${hasSlip?"— กดรูปเพื่อดูขยาย":""}</div>
      ${rejMsg}${slipImg}
      <div class="slip-acts">
        <button class="btn-ok2" onclick="verifySlip('${o._key}',true)">✅ ยืนยันโอนแล้ว</button>
        <button class="btn-rej" onclick="verifySlip('${o._key}',false)">❌ ไม่ผ่าน</button>
      </div>
    </div>`;
  }

  let footerBtn="";
  if(waiting) footerBtn=`<button class="btn-done" onclick="markDone('${o._key}')">✅ ทำเสร็จแล้ว</button>`;
  else if(done) footerBtn=`<button class="btn-done btn-undone" onclick="markDone('${o._key}')">↩ ยังไม่เสร็จ</button>`;
  else footerBtn=`<button class="btn-done btn-lock" disabled>รอยืนยันสลิปก่อน</button>`;

  return `<div class="oc ${done?"done":verifying?"verify":""}">
    <div class="oc-hdr ${hc}">
      <div><div class="oc-q" style="color:${qc};">🎫 คิว ${o.id}</div>
        <div style="font-size:13px;color:#666;margin-top:2px;">👤 ${o.customer} | 🕐 ${o.time}</div></div>
      <div class="badge ${bc}">${bt}</div>
    </div>
    <div class="oc-items">${items}</div>
    ${slipSec}
    <div class="oc-ftr">
      <div class="oc-tot">รวม <span>฿${o.total}</span></div>
      ${footerBtn}
    </div>
  </div>`;
}

async function verifySlip(key,ok){
  if(!window._FB) return;
  const r=window._FB.ref(window._FB.db,"orders/"+key);
  await window._FB.update(r,{slipVerified:ok, status:ok?"รอทำ":"สลิปไม่ผ่าน"});
  showToast(ok?"✅ ยืนยันสลิป → รอทำ":"❌ ปฏิเสธสลิปแล้ว");
}
async function markDone(key){
  if(!window._FB) return;
  const o=allOrders.find(x=>x._key===key);
  if(!o) return;
  const newStatus=o.status==="รอทำ"?"เสร็จแล้ว":"รอทำ";
  const r=window._FB.ref(window._FB.db,"orders/"+key);
  const update={status:newStatus};
  if(newStatus==="เสร็จแล้ว") update.doneTime=new Date().toLocaleTimeString("th-TH");
  await window._FB.update(r,update);
}
async function clearDone(){
  if(!confirm("ลบออเดอร์เสร็จแล้วทั้งหมด?")) return;
  if(!window._FB) return;
  const done=allOrders.filter(o=>o.status==="เสร็จแล้ว");
  for(const o of done){
    const r=window._FB.ref(window._FB.db,"orders/"+o._key);
    await window._FB.remove(r);
  }
}
function viewSlip(key){
  // key อาจเป็น _key หรือ src โดยตรง
  let src=key;
  if(!key.startsWith("data:")){
    const o=allOrders.find(x=>x._key===key||x.id===key);
    if(o&&o.slip) src=o.slip;
  }
  if(!src||!src.startsWith("data:")){
    showToast("⚠️ ไม่พบรูปสลิป"); return;
  }
  document.getElementById("smodal-img").src=src;
  document.getElementById("smodal").classList.add("open");
}

function sw(tab){
  curTab=tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("act"));
  document.getElementById("tab-"+tab).classList.add("act");
  document.querySelectorAll(".ts").forEach(s=>s.classList.remove("act"));
  document.getElementById("ts-"+tab).classList.add("act");
  if(tab==="s") renderSummary();
}

function renderSummary(){
  let income=0,bowls=0,menu={},noodle={},topping={};
  allOrders.forEach(o=>{
    (o.items||[]).forEach(it=>{
      bowls++;income+=it.price||0;
      const mn=(it.name||"").replace(/\(.*\)/,"").trim();
      menu[mn]=(menu[mn]||0)+1;
      if(it.noodle) noodle[it.noodle]=(noodle[it.noodle]||0)+1;
      (it.toppings||[]).forEach(t=>{topping[t]=(topping[t]||0)+1;});
    });
  });
  const top=obj=>Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const rows=(obj,unit)=>top(obj).map(([n,c])=>`<div class="sm-row"><span>${n}</span><span class="sm-val">${c} ${unit}</span></div>`).join("")||`<div style="color:#ccc;text-align:center;padding:10px;font-size:13px;">ยังไม่มีข้อมูล</div>`;
  const done=allOrders.filter(o=>o.status==="เสร็จแล้ว");
  document.getElementById("sm").innerHTML=`
    <div class="income-hero">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px;">💰 รายรับรวมทั้งหมด</div>
      <div class="ih-amt">฿${income.toLocaleString()}</div>
      <div style="font-size:12px;opacity:.75;margin-top:4px;">${bowls} ชาม | ${allOrders.length} ออเดอร์ | เสร็จ ${done.length}</div>
    </div>
    <div class="sm-card"><div class="sm-title">🍜 เมนูยอดนิยม</div>${rows(menu,"ชาม")}</div>
    <div class="sm-card"><div class="sm-title">🌾 เส้นนิยม</div>${rows(noodle,"ครั้ง")}</div>
    <div class="sm-card"><div class="sm-title">🥩 เครื่องยอดนิยม</div>${rows(topping,"ครั้ง")}</div>
    <div class="sm-card">
      <div class="sm-title">📅 สรุปรายวัน — ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</div>
      <div class="sm-row"><span>วันนี้รับออเดอร์</span><span class="sm-val">${allOrders.filter(o=>{const d=new Date();return o.time&&o.date===d.toLocaleDateString('th-TH')}).length||allOrders.length} ออเดอร์</span></div>
    </div>
    <div class="sm-card">
      <div class="sm-title">📋 สถิติ</div>
      <div class="sm-row"><span>ออเดอร์ทั้งหมด</span><span class="sm-val">${allOrders.length}</span></div>
      <div class="sm-row"><span>เสร็จแล้ว</span><span class="sm-val" style="color:var(--green);">${done.length}</span></div>
      <div class="sm-row"><span>รอดำเนินการ</span><span class="sm-val">${allOrders.length-done.length}</span></div>
      <div class="sm-row"><span>เฉลี่ยต่อออเดอร์</span><span class="sm-val">฿${allOrders.length?Math.round(income/allOrders.length):0}</span></div>
    </div>`;
}

function showToast(msg){const t=document.getElementById("toast");t.innerText=msg;t.className="show";setTimeout(()=>t.className="",3000);}
if(window._fbReady){ fbListen(); listenShopStatus(); listenSoldOut(); }
else window.addEventListener("fbReady",()=>{ fbListen(); listenShopStatus(); listenSoldOut(); },{once:true});
</script>
</body>
</html>
